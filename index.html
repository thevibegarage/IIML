<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: 0 4px 24px rgba(15, 23, 42, 0.06);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 20px;
      min-height: 1.25rem;
    }

    .status.error { color: var(--danger); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .add-form {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .add-form input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input:focus {
      border-color: var(--primary);
    }

    .add-form button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0 18px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .add-form button:hover { background: var(--primary-hover); }
    .add-form button:disabled { opacity: 0.6; cursor: not-allowed; }

    .task-list {
      list-style: none;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: #f8fafc; }

    .task-item.done .task-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-check {
      width: 20px;
      height: 20px;
      accent-color: var(--success);
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-title {
      flex: 1;
      font-size: 0.95rem;
      word-break: break-word;
    }

    .task-delete {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .task-delete:hover {
      color: var(--danger);
      background: #fef2f2;
    }

    .empty {
      padding: 48px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .stats strong {
      color: var(--text);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Task Planner</h1>
      <p>Add tasks, check them off, stay organized.</p>
    </header>

    <p id="status" class="status" aria-live="polite"></p>

    <div class="card">
      <form class="add-form" id="add-form">
        <input
          type="text"
          id="task-input"
          placeholder="What needs to be done?"
          autocomplete="off"
          maxlength="200"
          required
        >
        <button type="submit" id="add-btn">Add</button>
      </form>
      <ul class="task-list" id="task-list"></ul>
      <div class="empty" id="empty-state" hidden>No tasks yet. Add one above.</div>
    </div>

    <div class="stats" id="stats" hidden>
      <span><strong id="active-count">0</strong> active</span>
      <span><strong id="done-count">0</strong> done</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
